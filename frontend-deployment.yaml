apiVersion: apps/v1
kind: Deployment
metadata:
  name: tienda-frontend  
  namespace: tienda
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tienda-frontend # Cambiar a frontend
  template:
    metadata:
      labels:
        app: tienda-frontend # Cambiar a frontend
    spec:
      containers:
        - name: frontend # Cambiar a frontend
          image: 481047252233.dkr.ecr.us-east-1.amazonaws.com/tienda-frontend:latest 
          ports:
            - containerPort: 80 
          
         
